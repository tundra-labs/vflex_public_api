<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFLEX PDO / Status Viewer (MIDI)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 1rem;
      background: #f9f9f9;
    }
    h1 { color: #333; }
    #output {
      width: 100%;
      max-width: 960px;
      height: 520px;
      border: 1px solid #aaa;
      background: #fff;
      padding: 1rem;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      line-height: 1.4;
      margin: 1rem 0;
    }
    .info  { color: #0066cc; }
    .warn  { color: #cc6600; }
    .error { color: #c00; font-weight: bold; }
    button {
      padding: 0.6em 1.2em;
      margin: 0.4em;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<h1>VFLEX Debug Viewer (MIDI mode)</h1>

<p>
  <button id="btn-connect">Connect / Refresh</button>
  <button id="btn-clear">Clear Log</button>
</p>

<div id="output"></div>

<script src="lib.vflex.js"></script>
<script>
// ─── UI ─────────────────────────────────────────────
const vflex = new VFLEX();
const output = document.getElementById('output');

function log(msg, level = 'info') {
  const line = document.createElement('div');
  line.className = level;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

function clearLog() {
  output.innerHTML = '';
}

// Options for VFLEX locked modes:
const lockNames = [
  "Unlocked",
  "Limits locked",
  "All locked",
  "Reserved 0",
  "Reserved 1",
];

async function refresh() {
  clearLog();
  log("Trying to connect to vFlex MIDI...", 'info');

  try {
    await vflex.tryConnect();

    log("Connected!", 'info');

    await vflex.getString(VFLEX_COMMANDS.CMD_SERIAL_NUMBER);
    log(`Serial     : ${vflex.device_data.serial_num || '?'}`);

    await vflex.getString(VFLEX_COMMANDS.CMD_HARDWARE_ID);
    log(`HW ID      : ${vflex.device_data.hw_id || '?'}`);

    await vflex.getString(VFLEX_COMMANDS.CMD_MFG_DATE);
    log(`Mfg date   : ${vflex.device_data.mfg_date || '?'}`);

    await vflex.getString(VFLEX_COMMANDS.CMD_FIRMWARE_VERSION);
    log(`Firmware   : ${vflex.device_data.fw_id || '?'}`);

    await vflex.getVoltageMv();
    log(`Voltage    : ${vflex.device_data.voltage_mv ?? '?'} mV`);

    await vflex.getMaxCurrentMa();
    log(`Max current: ${vflex.device_data.max_current_ma ?? '?'} mA`);

    await vflex.getAuthLockLevel();
    const lockLvl = vflex.device_data.authlock_level ?? '?';
    const lockName = lockNames[lockLvl] ?? 'Unknown';
    log(`Auth Lock  : ${lockName} (${lockLvl})`);

    await vflex.getUserVLimit();
    log(`V Limit    : Low ${vflex.device_data.vlimit_low_mv ?? '?'} mV / High ${vflex.device_data.vlimit_high_mv ?? '?'} mV`);

    await vflex.getVToleranceNominalMv();
    log(`Tolerance Nominal: ${vflex.device_data.vtolerance_nominal_mv ?? '?'} mV`);

    await vflex.getVToleranceSagPerMa();
    log(`Tolerance Sag/MA : ${vflex.device_data.vtolerance_sag_per_ma ?? '?'} (per mA)`);

    await vflex.getVMeasureAdcCountOffset();
    log(`ADC Offset : ${vflex.device_data.vmeasure_adc_count_offset ?? '?'} counts`);

    await vflex.getVMeasureAdcCountScale();
    log(`ADC Scale  : ${vflex.device_data.vmeasure_adc_count_scale ?? '?'} milli-units`);

    await vflex.getVMeasure();
    log(`V Measure  : Raw ADC ${vflex.device_data.vmeasure_raw_adc ?? '?'} / Voltage ${vflex.device_data.vmeasure_voltage_mv ?? '?'} mV`);

    log("Fetching PDO log...", 'info');
    const result = await vflex.getFullPdoLog();
    log(result.output || "[PDO log parsed — output too long for console]");

  } catch (err) {
    log(`Error: ${err.message}`, 'error');
  }
}

document.getElementById('btn-connect').onclick = refresh;
document.getElementById('btn-clear').onclick = clearLog;

// Auto-connect on load
window.addEventListener('load', () => {
  refresh();
});
</script>
</body>
</html>
